<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ania Való | Arte y Pensamiento</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        /* RESET BÁSICO */
        *{ margin:0; padding:0; box-sizing:border-box; }
        html{ scroll-behavior:smooth; }
        body{ background:#f6f3ef; color:#111; font-family:'Inter',sans-serif; overflow-x:hidden; line-height: 1.6; }
        img{ width:100%; display:block; }
        a{ text-decoration:none; color:inherit; }
        .container{ width:90%; max-width:1450px; margin:auto; }

        /* NAVEGACIÓN Y MENÚ DESPLEGABLE */
        nav{ position:fixed; top:0; left:0; width:100%; background:rgba(246,243,239,0.95); backdrop-filter:blur(10px); z-index:999; padding:20px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
        .nav-inner{ display:flex; justify-content:space-between; align-items:center; }
        .logo{ font-family:'Cormorant Garamond',serif; font-size:32px; letter-spacing:2px; font-weight: 500; }
        
        .menu{ display:flex; gap:32px; align-items:center; list-style: none; }
        .menu a{ font-size:12px; text-transform:uppercase; letter-spacing:2px; transition:.3s; cursor: pointer; }
        
        /* Lógica del Desplegable */
        .dropdown { position: relative; }
        .dropdown-content { 
            display: none; position: absolute; top: 100%; left: 0; 
            background: #f6f3ef; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
            padding: 15px 0; border: 1px solid rgba(0,0,0,0.05);
        }
        .dropdown-content a { display: block; padding: 10px 20px; font-size: 11px; }
        .dropdown:hover .dropdown-content { display: block; }
        .menu a:hover { opacity: 0.5; }

        /* HERO */
        .hero{ min-height:100vh; display:flex; align-items:center; padding-top:100px; }
        .hero-grid{ display:grid; grid-template-columns:1.1fr 1fr; gap:70px; align-items:center; }
        .hero-text h1{ font-family:'Cormorant Garamond',serif; font-size:clamp(40px, 8vw, 90px); line-height:1; margin-bottom:30px; }
        .hero-image img{ height: 80vh; object-fit:cover; }

        /* SECCIONES */
        .section{ padding:100px 0; }
        .section-title{ font-family:'Cormorant Garamond',serif; font-size:clamp(36px, 6vw, 64px); margin-bottom:60px; }

        /* GALERÍA */
        .gallery{ display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:40px; }
        .art-card{ transition:.4s ease; background: white; padding: 15px; border-radius: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .art-card:hover{ transform:translateY(-10px); }
        .art-card img{ aspect-ratio: 4/5; object-fit:cover; margin-bottom: 20px; }
        
        .art-info h3{ font-family:'Cormorant Garamond',serif; font-size:28px; margin-bottom:10px; }
        .art-meta { font-size: 13px; color: #666; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .art-description { font-size: 14px; color: #444; margin-bottom: 20px; font-style: italic; }
        
        /* ESTADOS Y PRECIO */
        .status-tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 5px 12px; border-radius: 20px; font-weight: 600; }
        .status-disponible { background: #e8f5e9; color: #2e7d32; }
        .status-vendido { background: #f5f5f5; color: #9e9e9e; }
        .art-price { display: block; margin-top: 10px; font-weight: 600; font-size: 18px; }

        /* MOBILE */
        @media(max-width:992px){
            .hero-grid{ grid-template-columns:1fr; text-align: center; }
            .menu { display: none; } /* Aquí podrías añadir un menú hamburguesa luego */
        }
    </style>
</head>
<body>

<nav>
    <div class="container nav-inner">
        <div class="logo">ANIA VALÓ</div>
        <ul class="menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#biografia">Biografía</a></li>
            <li class="dropdown">
                <a>Colecciones <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></a>
                <div class="dropdown-content">
                    <a href="#puentes">Puentes Abstractos</a>
                    <a href="#jardines">Jardines</a>
                </div>
            </li>
            <li><a href="#vision">Visión</a></li>
            <li><a href="#escritos">Escritos</a></li>
            <li><a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        </ul>
    </div>
</nav>

<section class="hero" id="home">
    <div class="container hero-grid">
        <div class="hero-text">
            <h1>Arte, pensamiento y sensibilidad humana.</h1>
            <p>Exploración visual a través de la pintura y la reflexión contemporánea.</p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=1200" alt="Hero">
        </div>
    </div>
</section>

<section class="section" id="puentes">
    <div class="container">
        <h2 class="section-title">Colección: Puentes Abstractos</h2>
        <div class="gallery" id="galeria-puentes">
            <!-- Las obras se cargan aquí -->
        </div>
    </div>
</section>

<footer>
    <div class="container" style="text-align: center; padding: 40px 0; border-top: 1px solid #eee;">
        <p>© 2026 ANIA VALÓ</p>
    </div>
</footer>

<script>
    // CARGAR OBRAS DESDE JSON
    fetch('obras.json')
        .then(response => response.json())
        .then(data => {
            const contenedor = document.getElementById('galeria-puentes');
            data.forEach(obra => {
                const statusClass = obra.estado.toLowerCase() === 'disponible' ? 'status-disponible' : 'status-vendido';
                
                // Solo mostramos el precio si está disponible
                const precioHTML = (obra.estado.toLowerCase() === 'disponible') 
                    ? `<span class="art-price">${obra.precio}</span>` 
                    : '';

                contenedor.innerHTML += `
                    <div class="art-card">
                        <img src="${obra.imagen}" alt="${obra.titulo}">
                        <div class="art-info">
                            <h3>${obra.titulo}</h3>
                            <div class="art-meta">
                                <strong>Técnica:</strong> \${obra.tecnica} <br>
                                <strong>Medidas:</strong> \${obra.dimensiones} <br>
                                <strong>Año:</strong> \${obra.año}
                            </div>
                            <p class="art-description">"${obra.descripcion}"</p>
                            <span class="status-tag \${statusClass}">${obra.estado}</span>
                            \${precioHTML}
                        </div>
                    </div>
                `;
            });
        })
        .catch(error => console.error('Error al cargar obras:', error));
</script>

</body>
</html>
