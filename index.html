<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ania Való | Arte</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f6f3ef; font-family: 'Helvetica', sans-serif; color:#111; }
        
        /* NAVEGACIÓN */
        nav { position:fixed; top:0; width:100%; background:white; padding:20px; z-index:1000; border-bottom:1px solid #ddd; }
        .nav-inner { max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center; }
        
        .menu { display:flex; gap:20px; list-style:none; }
        .dropdown { position:relative; cursor:pointer; }
        .dropdown-content { 
            display:none; position:absolute; background:white; min-width:160px; 
            border:1px solid #ddd; top:20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .dropdown:hover .dropdown-content { display:block; }
        .dropdown-content a { display:block; padding:10px; text-decoration:none; color:black; font-size:12px; }
        .dropdown-content a:hover { background:#f0f0f0; }

        /* CONTENEDOR */
        .container { max-width:1200px; margin:120px auto; padding:20px; }
        
        /* TÍTULOS DE COLECCIÓN */
        .coleccion-section { margin-bottom: 80px; }
        .section-title { 
            font-size:28px; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:10px; 
        }
        
        /* CUADRÍCULA: 4 en PC, 2 en Móvil */
        .grid { 
            display:grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap:30px; 
        }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); gap:15px; } }

        /* TARJETA */
        .card { background:white; padding:15px; border-radius:2px; transition:0.3s ease; }
        .card img { width:100%; aspect-ratio: 4/5; object-fit: cover; margin-bottom:15px; transition: 0.4s; }
        
        /* EFECTO AGRANDAR AL TOCAR */
        .card:active { transform: scale(1.05); z-index: 10; }
        
        .info h3 { font-size:18px; margin-bottom:8px; }
        .info p { font-size:12px; color:#666; margin-bottom:4px; }
        .status { display:inline-block; padding:4px 8px; font-size:10px; text-transform:uppercase; margin-top:10px; font-weight:bold; }
        .disponible { background:#e8f5e9; color:#2e7d32; }
        .vendido { background:#f5f5f5; color:#999; }
        .precio { font-weight:bold; margin-top:8px; font-size:15px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div style="font-size:20px; letter-spacing:3px;">ANIA VALÓ</div>
        <ul class="menu">
            <li class="dropdown">
                <span style="font-size:12px; letter-spacing:1px;">COLECCIONES ▼</span>
                <div class="dropdown-content">
                    <a href="#puentes">Puentes Abstractos</a>
                    <a href="#jardines">Jardines</a>
                    <a href="#interiores">Interiores</a>
                    <a href="#abstracciones">Abstracciones</a>
                </div>
            </li>
            <li><a href="#contacto" style="text-decoration:none; color:black; font-size:12px;">CONTACTO</a></li>
        </ul>
    </div>
</nav>

<div class="container" id="main-container">
    <!-- El script creará las secciones aquí automáticamente -->
</div>

<script>
    fetch('obras.json?v=' + Math.random())
    .then(res => res.json())
    .then(data => {
        const mainContainer = document.getElementById('main-container');
        
        // 1. Definimos las colecciones que queremos mostrar
        const colecciones = ["puentes", "jardines", "interiores", "abstracciones"];
        
        // 2. Creamos las secciones en el HTML primero
        colecciones.forEach(col => {
            const section = document.createElement('section');
            section.id = col;
            section.className = 'coleccion-section';
            section.innerHTML = `
                <h2 class="section-title">${col.replace(/^\w/, c => c.toUpperCase())}</h2>
                <div class="grid" id="grid-${col}"></div>
            `;
            mainContainer.appendChild(section);
        });

        // 3. Repartimos las obras en sus respectivas secciones
        data.forEach(obra => {
            const grid = document.getElementById('grid-' + obra.coleccion.toLowerCase());
            if(grid) {
                const sClass = obra.estado.toLowerCase() === 'disponible' ? 'disponible' : 'vendido';
                const precioHTML = obra.estado.toLowerCase() === 'disponible' ? `<div class="precio">${obra.precio}</div>` : '';
                
                grid.innerHTML += `
                    <div class="card">
                        <img src="${obra.imagen}" alt="${obra.titulo}">
                        <div class="info">
                            <h3>${obra.titulo}</h3>
                            <p><strong>Técnica:</strong> \${obra.tecnica}</p>
                            <p><strong>Medidas:</strong> \${obra.dimensiones}</p>
                            <p><strong>Año:</strong> \${obra.año}</p>
                            <p style="font-style:italic; margin-top:5px;">${obra.descripcion}</p>
                            <span class="status \${sClass}">${obra.estado}</span>
                            \${precioHTML}
                        </div>
                    </div>
                `;
            }
        });
    })
    .catch(err => console.error("Error cargando el JSON:", err));
</script>

</body>
</html>
