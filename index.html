<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ania Valo Art</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* MENÚ */
.menu {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  z-index: 1000;
}

.logo img {
  height: 60px;
}

/* NAV */
.nav {
  display: flex;
  align-items: center;
  font-size: 0; /* elimina espacios basura */
}

.nav a,
.dropdown button {
  font-size: 16px;
  margin: 0 15px;
  text-decoration: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
  background: none;
  border: none;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  min-width: 200px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  border-radius: 6px;
  overflow: hidden;
  z-index: 999;
}

.dropdown-content a {
  display: block;
  padding: 12px;
  font-weight: normal;
}

.dropdown-content a:hover {
  background: #f5f5f5;
}

.dropdown.active .dropdown-content {
  display: block;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
  background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
  background-size: cover;
}

/* SECCIONES */
.section {
  padding: 100px 20px;
  text-align: center;
}
</style>

</head>

<body>

<div id="sobre" class="section">

<script>
document.addEventListener("DOMContentLoaded", function() {

  const dropdown = document.getElementById("dropdown");
  const btn = document.getElementById("btnMenu");

  btn.addEventListener("click", function(e) {
    e.stopPropagation();
    dropdown.classList.toggle("active");
  });

  document.addEventListener("click", function() {
    dropdown.classList.remove("active");
  });

});
</script>
