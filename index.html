<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ania Való | Arte y Pensamiento</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            background:#f6f3ef;
            color:#111;
            font-family:'Inter',sans-serif;
            overflow-x:hidden;
            line-height: 1.6;
        }

        img{
            width:100%;
            display:block;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        .container{
            width:90%;
            max-width:1450px;
            margin:auto;
        }

        /* NAV */
        nav{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            background:rgba(246,243,239,0.95);
            backdrop-filter:blur(10px);
            z-index:999;
            padding:20px 0;
            border-bottom:1px solid rgba(0,0,0,0.05);
        }

        .nav-inner{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-family:'Cormorant Garamond',serif;
            font-size:32px;
            letter-spacing:2px;
            font-weight: 500;
        }

        .menu{
            display:flex;
            gap:32px;
            align-items:center;
        }

        .menu a{
            font-size:12px;
            text-transform:uppercase;
            letter-spacing:2px;
            transition:.3s;
        }

        .menu a:hover{
            opacity:.5;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* HERO */
        .hero{
            min-height:100vh;
            display:flex;
            align-items:center;
            padding-top:100px;
            padding-bottom: 50px;
        }

        .hero-grid{
            display:grid;
            grid-template-columns:1.1fr 1fr;
            gap:70px;
            align-items:center;
        }

        .hero-text h1{
            font-family:'Cormorant Garamond',serif;
            font-size:clamp(40px, 8vw, 105px);
            line-height:0.95;
            font-weight:400;
            margin-bottom:30px;
        }

        .hero-text p{
            font-size:18px;
            line-height:1.8;
            color:#444;
            max-width:550px;
        }

        .hero-image img{
            height: 80vh;
            object-fit:cover;
            border-radius: 2px;
        }

        /* SECTIONS */
        .section{
            padding:100px 0;
        }

        .section-title{
            font-family:'Cormorant Garamond',serif;
            font-size:clamp(36px, 6vw, 72px);
            font-weight:400;
            margin-bottom:60px;
        }

        /* BIO */
        .bio{
            max-width:850px;
        }

        .bio p{
            font-size:18px;
            line-height:1.9;
            color:#444;
        }

        /* COLLECTION MENU */
        .collection-links{
            display:flex;
