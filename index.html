<!DOCTYPE html>
<html>
<head>
  <title>Ania Valo Art</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* MENÚ */
    .menu {
      position: fixed;
      width: 100%;
      background: white;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .menu a {
      margin: 0 15px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    /* PORTADA */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      text-align: center;

      background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
      background-size: cover;
      background-position: center;
    }

    /* SECCIONES */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    /* GALERÍA */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .grid img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

  </style>
</head>

<body>

<!-- MENÚ -->
<div class="menu">
  <a href="#inicio">Inicio</a>
  <a href="#jardines">Jardines</a>
  <a href="#luz">Luz</a>
  <a href="#sobre">Sobre mí</a>
  <a href="#contacto">Contacto</a>
</div>

<!-- INICIO -->
<div id="inicio" class="hero">
  <h1>Ania Valo</h1>
  <p>Obras que nacen de la naturaleza y la emoción.</p>
</div>

<!-- COLECCIÓN JARDINES -->
<div id="jardines" class="section">
  <h2>Jardines</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1504196606672-aef5c9cefc92">
  </div>
</div>

<!-- COLECCIÓN LUZ -->
<div id="luz" class="section">
  <h2>Luz</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1500534623283-312aade485b7">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  </div>
</div>

<!-- SOBRE -->
<div id="sobre" class="section" style="background:#f5f5f5;">
  <h2>Sobre mí</h2>
  <p>Mi trabajo nace de una conexión con la naturaleza y las emociones.</p>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section">
  <h2>Contacto</h2>
  <p>Escribime para adquirir una obra.</p>
</div>

</body>
</html>
