<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ania Való</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
    /* --- ESTILOS (Se mantienen exactamente igual) --- */
    *{ margin:0; padding:0; box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{ background:#f6f3ef; color:#111; font-family:'Inter',sans-serif; overflow-x:hidden; }
    img{ width:100%; display:block; }
    a{ text-decoration:none; color:inherit; }
    .container{ width:90%; max-width:1450px; margin:auto; }

    nav{ position:fixed; top:0; left:0; width:100%; background:rgba(246,243,239,0.92); backdrop-filter:blur(10px); z-index:999; padding:30px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
    .nav-inner{ display:flex; justify-content:space-between; align-items:center; }
    .logo{ font-family:'Cormorant Garamond',serif; font-size:42px; letter-spacing:2px; }
    .menu{ display:flex; gap:32px; align-items:center; }
    .menu a{ font-size:13px; text-transform:uppercase; letter-spacing:2px; transition:.3s; }
    
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; background-color: #f6f3ef; min-width: 200px; box-shadow: 0px 10px 20px rgba(0,0,0,0.05); z-index: 1000; top: 100%; left: 0; padding: 15px 0; border: 1px solid rgba(0,0,0,0.05); }
    .dropdown-content a { display: block; padding: 10px 20px; font-size: 11px !important; color: #444; }
    .dropdown:hover .dropdown-content { display: block; }

    .section{ padding:130px 0; }
    .section-title{ font-family:'Cormorant Garamond',serif; font-size:72px; font-weight:400; margin-bottom:60px; }

    .gallery{ display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:40px; }
    .art-card{ transition:.4s; margin-bottom: 20px; }
    .art-card img{ height:450px; object-fit:cover; margin-bottom:20px; }
    
    .art-info h3{ font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:400; margin-bottom:5px; }
    .art-meta { font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .art-description { font-size: 14px; line-height: 1.6; color: #555; margin-bottom: 15px; }
    
    .art-status-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.06); }
    .status-tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .disponible { color: #27ae60; }
    .vendida { color: #999; }
    .price { font-size: 14px; font-weight: 500; color: #111; }

    footer{ padding:60px 0; border-top:1px solid rgba(0,0,0,0.08); margin-top:80px; }
    .footer-inner{ display:flex; justify-content:space-between; align-items:center; }
</style>
</head>

<body>

<nav>
    <div class="container nav-inner">
        <div class="logo">ANIA VALÓ</div>
        <div class="menu">
            <a href="#home">Home</a>
            <div class="dropdown">
                <a href="#colecciones">Colecciones <i class="fa-solid fa-chevron-down" style="font-size:10px"></i></a>
                <div id="dropdown-list" class="dropdown-content">
                    <!-- Las colecciones se cargan solas aquí -->
                </div>
            </div>
            <a href="#vision">Visión</a>
            <a href="#contacto">Contacto</a>
        </div>
    </div>
</nav>

<div id="main-content">
    <!-- Aquí es donde el "cerebro" pondrá todas las colecciones y obras automáticamente -->
</div>

<footer>
    <div class="container footer-inner">
        <div class="footer-logo">ANIA VALÓ</div>
        <div>© 2026</div>
    </div>
</footer>

<script>
    /* 
       ESTE ES EL LUGAR DONDE INGRESAS TUS OBRAS.
       No es código de programación difícil, es solo una lista.
       Puedes añadir o quitar filas respetando las comas y llaves.
    */
    const misColecciones = [
        {
            nombre: "Puentes Abstractos",
            id: "puentes",
            obras: [
                {
                    titulo: "Umbral",
                    año: "2026",
                    tamaño: "100x120cm",
                    tecnica: "Acrílico sobre tela",
                    descripcion: "Exploración sobre los límites de la percepción.",
                    disponible: true,
                    precio: "$850 USD",
                    imagen: "https://picsum.photos/500/700?random=1"
                },
                {
                    titulo: "Materia",
                    año: "2025",
                    tamaño: "80x80cm",
                    tecnica: "Técnica mixta",
                    descripcion: "Estudio textural sobre la permanencia.",
                    disponible: false,
                    precio: "",
                    imagen: "https://picsum.photos/500/700?random=2"
                }
            ]
        },
        {
            nombre: "Jardines",
            id: "jardines",
            obras: [
                {
                    titulo: "Jardín Interior I",
                    año: "2026",
                    tamaño: "90x110cm",
                    tecnica: "Óleo",
                    descripcion: "Interpretación abstracta de la naturaleza.",
                    disponible: true,
                    precio: "$920 USD",
                    imagen: "https://picsum.photos/500/700?random=11"
                }
            ]
        }
    ];

    // --- EL "CEREBRO" QUE DIBUJA TODO SOLO (No tocar) ---
    function cargarContenido() {
        const contenedorPrincipal = document.getElementById('main-content');
        const listaMenu = document.getElementById('dropdown-list');

        misColecciones.forEach(coleccion => {
            // Crear link en el menú
            listaMenu.innerHTML += `<a href="#${coleccion.id}">${coleccion.nombre}</a>`;

            // Crear Sección de Galería
            let htmlObras = '';
            coleccion.obras.forEach(obra => {
                htmlObras += `
                    <div class="art-card">
                        <img src="${obra.imagen}">
                        <div class="art-info">
                            <h3>${obra.titulo}</h3>
                            <div class="art-meta">${obra.año} · \${obra.tamaño} · \${obra.tecnica}</div>
                            <p class="art-description">${obra.descripcion}</p>
                            <div class="art-status-row">
                                <span class="status-tag \${obra.disponible ? 'disponible' : 'vendida'}">
                                    \${obra.disponible ? 'Disponible' : 'Vendida / Col. Privada'}
                                </span>
                                \${obra.disponible ? `<span class="price">${obra.precio}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            contenedorPrincipal.innerHTML += `
                <section class="section" id="${coleccion.id}">
                    <div class="container">
                        <h2 class="section-title">${coleccion.nombre}</h2>
                        <div class="gallery">${htmlObras}</div>
                    </div>
                </section>
            `;
        });
    }

    // Ejecutar al cargar la página
    window.onload = cargarContenido;
</script>

</body>
</html>
